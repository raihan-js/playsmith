# Playsmith configuration — copy to playsmith.yaml and edit.
# Every model (local or cloud) is reached through the OpenAI-compatible /v1 API.

# Where generated game projects are written (NEVER inside the Playsmith repo).
workspace_dir: "~/playsmith-games"

# Default LLM provider. Reached via OpenAI-compatible /v1 (kind: openai) or Anthropic
# /v1/messages (kind: anthropic). Per-task overrides and a cloud fallback are optional.
llm:
  provider: "ollama"
  base_url: "http://localhost:11434/v1"
  model: "qwen2.5-coder:7b"
  api_key: ""            # blank for local; set for cloud providers
  num_ctx: 16384         # IMPORTANT: 16K–32K. The 4K default breaks agentic editing.
  kind: "openai"         # "openai" (Ollama/LM Studio/vLLM/OpenAI/OpenRouter/Gemini) or "anthropic"

  # Optional model router (Phase 1): per-task provider overrides. TaskTypes: general,
  # coding, reasoning, routing. Unset tasks use the default provider above.
  # routes:
  #   coding:
  #     provider: "openrouter"
  #     base_url: "https://openrouter.ai/api/v1"
  #     model: "qwen/qwen-2.5-coder-32b-instruct"
  #     api_key: "${OPENROUTER_API_KEY}"
  #     kind: "openai"

  # Optional cloud fallback for hard CODING/REASONING steps when the local model fails or
  # returns no tool call. Crossing local -> cloud ALWAYS warns the user (CLAUDE.md §5).
  # For Anthropic use kind: "anthropic" (native /v1/messages). Its OpenAI-compat endpoint
  # drops strict tool schemas + prompt caching, which is unreliable for the tool loop.
  # fallback:
  #   provider: "anthropic"
  #   base_url: "https://api.anthropic.com/v1"
  #   model: "claude-sonnet-4-6"
  #   api_key: "${ANTHROPIC_API_KEY}"
  #   kind: "anthropic"

# Engine settings.
engine:
  default: "godot"
  godot:
    binary: "godot"      # path to the Godot 4.x executable
    version: "4"

# Asset generation (optional). If unavailable, Playsmith uses placeholders and still ships.
assets:
  enabled: false                          # true -> agent generates sprites in-loop during `new`
  comfyui_url: "http://localhost:8188"    # 2D image generation (ComfyUI)
  model: "sd_xl_base_1.0.safetensors"     # the checkpoint ComfyUI loads (must exist in ComfyUI)
  mesh_url: ""                            # 3D mesh backend (Hunyuan3D/TRELLIS); empty => primitives only
  mesh_backend: "hunyuan3d"               # hunyuan3d (Apache-2.0) | trellis (MIT)
  blender_path: "blender"                 # optional headless mesh cleanup; skipped if not installed

# Publishing (Phase 1+).
publish:
  itch:
    butler_path: "butler"
