# Playsmith configuration — copy to playsmith.yaml and edit.
# Every model (local or cloud) is reached through the OpenAI-compatible /v1 API, or Anthropic's
# native /v1/messages. Playsmith is TIERED: a frontier model drives the director/critic reasoning,
# local models handle cheap sub-steps (see WHY.md / the Unreal-first pivot).

# Where generated game projects are written (NEVER inside the Playsmith repo).
workspace_dir: "~/playsmith-games"

# Default LLM provider. For the best results, point the default (or the routes below) at a
# frontier model — e.g. Claude via kind: "anthropic" — and keep a local model for cheap steps.
llm:
  provider: "ollama"
  base_url: "http://localhost:11434/v1"
  model: "qwen2.5-coder:7b"
  api_key: ""            # blank for local; set for cloud providers
  num_ctx: 16384         # IMPORTANT: 16K–32K. The 4K default breaks agentic editing.
  kind: "openai"         # "openai" (Ollama/LM Studio/vLLM/OpenAI/OpenRouter/Gemini/NVIDIA) or "anthropic"

  # NVIDIA NIM (OpenAI-compatible) — a great frontier option if you don't have an Anthropic key.
  # Put NVIDIA_API_KEY in a local .env (auto-loaded) and use, e.g.:
  #   provider: "nvidia"
  #   base_url: "https://integrate.api.nvidia.com/v1"
  #   model: "meta/llama-3.3-70b-instruct"   # vision (for the critic): meta/llama-3.2-90b-vision-instruct
  #   api_key: "${NVIDIA_API_KEY}"
  #   kind: "openai"

  # TIERED setup (recommended): frontier model as the director/critic, local for cheap sub-steps.
  # routes:
  #   reasoning:                       # director / critic / planning
  #     provider: "anthropic"
  #     base_url: "https://api.anthropic.com/v1"
  #     model: "claude-opus-4-8"
  #     api_key: "${ANTHROPIC_API_KEY}"
  #     kind: "anthropic"
  #   coding:
  #     provider: "anthropic"
  #     base_url: "https://api.anthropic.com/v1"
  #     model: "claude-sonnet-4-6"
  #     api_key: "${ANTHROPIC_API_KEY}"
  #     kind: "anthropic"

  # Optional cloud fallback for hard steps when the local model fails or returns no tool call.
  # Crossing local -> cloud ALWAYS warns the user (CLAUDE.md §5).
  # fallback:
  #   provider: "anthropic"
  #   base_url: "https://api.anthropic.com/v1"
  #   model: "claude-sonnet-4-6"
  #   api_key: "${ANTHROPIC_API_KEY}"
  #   kind: "anthropic"

# Engine settings. Playsmith targets Unreal Engine 5.x; UE runs on the host.
engine:
  default: "unreal"
  unreal:
    # Path to UnrealEditor-Cmd (the headless editor). Auto-discovered from ~/UnrealEngine if blank.
    editor_cmd: "UnrealEditor-Cmd"

# Community skill marketplace. Installs are integrity-checked and never auto-executed;
# untrusted skills require `--allow-untrusted`. See docs/SKILL_SPEC.md + docs/CONTRIBUTING_SKILLS.md.
skills:
  registry_url: "https://raw.githubusercontent.com/raihan-js/playsmith-skills/main/index.json"
  dir: "~/.playsmith/skills"            # where installed community skills live
