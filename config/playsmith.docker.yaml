# Playsmith config for the Docker image. The LLM uses your OpenAI key (from $OPENAI_API_KEY).
# Change `llm.model` to any OpenAI model you prefer; gpt-4o is a solid default for the agent loop.

workspace_dir: "/workspace"          # mounted to ./playsmith-games on the host

llm:
  provider: "openai"
  base_url: "https://api.openai.com/v1"
  model: "gpt-4o"                    # capable at multi-step tool calls; gpt-4o-mini is cheaper
  api_key: "${OPENAI_API_KEY}"       # supplied via .env / the environment
  kind: "openai"

engine:
  default: "godot"
  godot:
    binary: "godot"                  # baked into the image at /usr/local/bin/godot
    version: "4"

assets:
  enabled: true                      # generate real art (sprites/backgrounds) for games
  image_backend: "openai"            # uses your OpenAI key — no GPU/ComfyUI needed
  openai_api_key: "${OPENAI_API_KEY}"
  image_model: "gpt-image-1"         # or "dall-e-3"

publish:
  itch:
    butler_path: "butler"

skills:
  registry_url: "https://raw.githubusercontent.com/raihan-js/playsmith-skills/main/index.json"
  dir: "/root/.playsmith/skills"
